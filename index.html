  <body style="background-color: #060a16; margin: 0; padding: 0;">
    <div id="root"></div>

    <script src="https://js.paystack.co/v1/inline.js"></script>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => {
              console.log('Vortex Signal: Service Worker Active');
              // Forces the SW to update if you change the code
              reg.update();
            })
            .catch(err => console.log('Signal Failed', err));
        });
      }
    </script>
  </body>
